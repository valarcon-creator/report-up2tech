<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard Live — Marketplaces up2tech</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:28px 24px;max-width:1100px;margin:0 auto;}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.spinner{width:40px;height:40px;border:3px solid #e5e5e5;border-top-color:#1a1a1a;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading p{font-size:13px;color:#888;}
#error{display:none;background:#fef2f2;border:0.5px solid #f5c6c6;border-radius:8px;padding:20px 24px;margin:40px auto;max-width:540px;text-align:center;}
#error h3{font-size:14px;color:#b91c1c;margin-bottom:8px;}
#error p{font-size:12px;color:#888;line-height:1.6;}
#error pre{background:#fee;padding:8px;border-radius:4px;font-size:10px;color:#b91c1c;margin-top:8px;text-align:left;white-space:pre-wrap;word-break:break-all;}
#dashboard{display:none;}

/* Layout */
.header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;padding-bottom:14px;border-bottom:1.5px solid #1a1a1a;}
.h-eye{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#888;margin-bottom:3px;}
.h-title{font-size:21px;font-weight:700;}
.h-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:#e6f7ee;color:#1a6e3a;padding:2px 8px;border-radius:3px;margin-top:4px;}
.slbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#aaa;margin-bottom:8px;}
.divider{border:none;border-top:0.5px solid #e5e5e5;margin:20px 0;}

/* KPI strip */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.kpi{background:#fff;border:0.5px solid #e5e5e5;border-radius:8px;padding:12px 14px;}
.kpi.alert{border-color:#f5c6c6;}
.kl{font-size:10px;color:#888;margin-bottom:4px;}
.kv{font-size:20px;font-weight:700;}
.ka{font-size:10px;color:#aaa;margin-top:2px;}

/* Two group panels */
.two-grp{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.grp-panel{background:#fff;border:0.5px solid #e5e5e5;border-radius:8px;overflow:hidden;}
.grp-head{padding:10px 14px;border-bottom:0.5px solid #eee;display:flex;justify-content:space-between;align-items:center;}
.grp-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#888;}
.grp-summary{display:flex;gap:16px;align-items:center;}
.gs-fat{font-size:18px;font-weight:700;color:#1a1a1a;}
.gs-mg{font-size:12px;font-weight:600;}
.gs-share{font-size:10px;color:#aaa;}

/* Channel table inside group */
.ch-tbl{width:100%;border-collapse:collapse;font-size:11.5px;}
.ch-tbl th{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#aaa;padding:5px 10px;border-bottom:0.5px solid #eee;text-align:left;}
.ch-tbl th.r{text-align:right;}
.ch-tbl td{padding:6px 10px;border-bottom:0.5px solid #f5f4f0;vertical-align:middle;}
.ch-tbl td.r{text-align:right;}
.ch-tbl tr:last-child td{border-bottom:none;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;}
.bg{background:#e6f7ee;color:#1a6e3a;}.br{background:#fde8e8;color:#b91c1c;}.ba{background:#fff3e0;color:#b45309;}.bb{background:#e8f0fe;color:#1a56a8;}
.share-bar{display:flex;align-items:center;gap:5px;}
.sbar{flex:1;height:3px;background:#eee;border-radius:2px;overflow:hidden;min-width:24px;}
.sbfill{height:100%;border-radius:2px;}
.spct{font-size:10px;color:#aaa;width:34px;text-align:right;flex-shrink:0;}

/* Comparativo toggle */
.comp-panel{background:#fff;border:0.5px solid #e5e5e5;border-radius:8px;overflow:hidden;margin-bottom:18px;}
.comp-tabs{display:flex;border-bottom:0.5px solid #e5e5e5;}
.ctab{flex:1;padding:8px 0;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:#fff;color:#aaa;border:none;cursor:pointer;}
.ctab.nose{background:#f0f7f0;color:#16a34a;}
.ctab.wse{background:#fff3e0;color:#b45309;}
.comp-body{padding:14px 16px;}
.comp-vs{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:12px;}
.cv-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#888;margin-bottom:4px;text-align:center;}
.cv-num{font-size:30px;font-weight:700;line-height:1;text-align:center;}
.cv-sub{font-size:9px;color:#aaa;margin-top:2px;text-align:center;}
.cv-sep{font-size:14px;color:#ccc;text-align:center;}
.msg-box{border-radius:5px;padding:6px 10px;font-size:10px;margin-bottom:12px;}
.msg-g{background:#f0f7f0;color:#1a6e3a;}.msg-a{background:#fef9e7;color:#92620a;}
.comp-ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.comp-ch-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:4px 0;border-bottom:0.5px solid #f0eeea;}
.comp-ch-row:last-child{border-bottom:none;}
.cc-name{color:#555;}.cc-val{font-weight:600;}.cc-fat{font-size:9px;color:#aaa;margin-left:4px;}
.col-hdr{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#aaa;margin-bottom:6px;}
.comp-note{font-size:9px;color:#aaa;margin-top:8px;}

/* Data tables */
.data-tbl{width:100%;border-collapse:collapse;font-size:11.5px;}
.data-tbl th{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#aaa;padding:6px 10px;border-bottom:0.5px solid #eee;text-align:left;white-space:nowrap;}
.data-tbl th.r{text-align:right;}
.data-tbl td{padding:7px 10px;border-bottom:0.5px solid #f5f4f0;vertical-align:middle;}
.data-tbl td.r{text-align:right;}
.data-tbl tr:nth-child(even) td{background:#fafaf8;}
.data-tbl tr:last-child td{border-bottom:none;}
.data-tbl tr:hover td{background:#f5f4f0;}
.rank-n{font-size:10px;color:#ccc;width:18px;text-align:right;}

.panel{background:#fff;border:0.5px solid #e5e5e5;border-radius:8px;overflow:hidden;margin-bottom:18px;}
.panel-hdr{padding:9px 14px;background:#fafafa;border-bottom:0.5px solid #eee;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#888;}

.footer-bar{font-size:9px;color:#bbb;text-align:right;padding-top:10px;border-top:0.5px solid #e5e5e5;margin-top:8px;}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>Carregando dados da planilha...</p></div>
<div id="error"><h3>Não foi possível carregar os dados</h3><p>Verifique se a planilha está com acesso público.</p><pre id="err-detail"></pre><p style="margin-top:10px"><button onclick="location.reload()" style="padding:6px 16px;background:#1a1a1a;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px">Tentar novamente</button></p></div>
<div id="dashboard"></div>

<script>
const SHEET_ID   = '1hnxVpZRALknZCN7Cp9LwWBOHB9CpNV8cD156ZqhoMjg';
const SHEET_NAME = 'Dashboard';

const COL = { SKU:0, QTD:1, FAT:2, CURVA:4, PROD:5, MARCA:6, DEPT:7, MG:32 };

const CH_DEF = [
  {name:'Mercado Livre', col:8,  mine:false, meta:10000000},
  {name:'Amazon',        col:9,  mine:true,  meta:65000000},
  {name:'Shopee',        col:10, mine:false, meta:19000000},
  {name:'Via Varejo',    col:11, mine:false, meta:9000000},
  {name:'Magalu',        col:12, mine:true,  meta:10000000},
  {name:'Fast Shop',     col:15, mine:true,  meta:2000000},
  {name:'Tiktok Shop',   col:16, mine:true,  meta:400000},
  {name:'Carrefour',     col:18, mine:true,  meta:3000000},
  {name:'Kabum',         col:20, mine:true,  meta:3000000},
  {name:'Itaú Shop',     col:21, mine:true,  meta:2000000},
  {name:'Martins Atacado',col:23,mine:true,  meta:400000},
];
const CHANNELS_MINE   = CH_DEF.filter(c=>c.mine).map(c=>c.name);
const CHANNELS_OTHERS = CH_DEF.filter(c=>!c.mine).map(c=>c.name);
const ALL_CH = CH_DEF.map(c=>c.name);

const toNum = v => {
  if (v===null||v===undefined) return 0;
  if (typeof v==='number') return isNaN(v)?0:v;
  const s = String(v).replace(/R\$\s*/g,'').replace(/\s/g,'').replace(/\./g,'').replace(',','.').replace('%','');
  return parseFloat(s)||0;
};
const fmt = n => {
  if (Math.abs(n)>=1e6) return 'R$ '+(n/1e6).toFixed(1)+'M';
  if (Math.abs(n)>=1e3) return 'R$ '+Math.round(n/1e3)+'K';
  return 'R$ '+Math.round(n);
};
const fmtN = n => n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?Math.round(n/1e3)+'K':Math.round(n).toString();
const pct = n => (n*100).toFixed(1)+'%';
const clr = v => v>=0.15?'#16a34a':v>=0.05?'#b45309':'#b91c1c';
const bdg = v => v>=0.15?'bg':v>=0.05?'bb':'br';

async function fetchRows() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP '+r.status);
  const txt = await r.text();
  const m = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
  if (!m) throw new Error('Resposta inesperada');
  const data = JSON.parse(m[1]);
  return data.table.rows.map(row =>
    (row&&row.c) ? row.c.map(cell=>{
      if (!cell) return null;
      if (typeof cell.v==='number') return cell.v;
      if (cell.f) return cell.f;
      return cell.v;
    }) : []
  );
}

async function load() {
  try {
    const rows = await fetchRows();

    // SKU data starts at row index 26
    const skus = [];
    for (let i=26; i<rows.length; i++) {
      const r = rows[i];
      if (!r||r.length<8) continue;
      const sku = toNum(r[COL.SKU]);
      const fat = toNum(r[COL.FAT]);
      if (sku<=0||fat<=0) continue;
      const mgRaw = toNum(r[COL.MG]);
      const mg = Math.abs(mgRaw)>1 ? mgRaw/100 : mgRaw;
      const obj = {
        sku, fat, mg, mg_r:fat*mg,
        qtd:     toNum(r[COL.QTD]),
        produto: String(r[COL.PROD]||'').trim(),
        marca:   String(r[COL.MARCA]||'').trim(),
        dept:    String(r[COL.DEPT]||'').trim(),
      };
      CH_DEF.forEach(ch => { obj[ch.name] = toNum(r[ch.col]); });
      if (obj.produto) skus.push(obj);
    }
    if (skus.length===0) throw new Error('Nenhum SKU encontrado.');
    // Store globals for SE toggle
    _chCalc = chCalc;
    _chNoSE = chNoSE;
    _chsMine = CHANNELS_MINE;
    _chsOth  = CHANNELS_OTHERS;
    _fatTotal = fatMine + fatOth;
    _chMine = {
      all:  grpMg(skus, CHANNELS_MINE),
      nose: grpMg(noSE, CHANNELS_MINE),
    };
    _chOth = {
      all:  grpMg(skus, CHANNELS_OTHERS),
      nose: grpMg(noSE, CHANNELS_OTHERS),
    };

    // ── Totals ──────────────────────────────────────────────────────────────
    const totalFat = skus.reduce((s,r)=>s+r.fat,0);
    const totalQtd = skus.reduce((s,r)=>s+r.qtd,0);
    const totalMgR = skus.reduce((s,r)=>s+r.mg_r,0);

    // Per-channel calc
    const chCalc = {};
    ALL_CH.forEach(ch => {
      const fat  = skus.reduce((s,r)=>s+r[ch],0);
      const mg_r = skus.reduce((s,r)=>s+r[ch]*r.mg,0);
      const qtd  = skus.filter(r=>r[ch]>0).reduce((s,r)=>s+r.qtd,0);
      chCalc[ch] = { fat, mg_r, pct: fat>0?mg_r/fat:0, qtd };
    });

    // Group totals
    const grpFat  = grp => grp.reduce((s,ch)=>s+chCalc[ch].fat,0);
    const grpMgR  = grp => grp.reduce((s,ch)=>s+chCalc[ch].mg_r,0);
    const fatMine = grpFat(CHANNELS_MINE);
    const mgMine  = fatMine>0 ? grpMgR(CHANNELS_MINE)/fatMine : 0;
    const fatOth  = grpFat(CHANNELS_OTHERS);
    const mgOth   = fatOth>0 ? grpMgR(CHANNELS_OTHERS)/fatOth : 0;
    const fatTotal = fatMine + fatOth;

    // Metas
    const chData = {};
    ALL_CH.forEach(ch => {
      chData[ch] = { ...chCalc[ch], meta: CH_DEF.find(d=>d.name===ch)?.meta||0 };
    });

    // SE
    const isSE = s => s.produto.toUpperCase().includes('IPHONE') && / SE[\s\d]/.test(s.produto.toUpperCase());
    const noSE = skus.filter(s=>!isSE(s));
    const grpMg = (sub,chs) => {
      let fat=0,mg_r=0;
      chs.forEach(ch=>{fat+=sub.reduce((s,r)=>s+r[ch],0);mg_r+=sub.reduce((s,r)=>s+r[ch]*r.mg,0);});
      return {fat,mg_r,pct:fat>0?mg_r/fat:0};
    };
    const comp = {
      mine_all:  grpMg(skus,CHANNELS_MINE),
      mine_nose: grpMg(noSE,CHANNELS_MINE),
      oth_all:   grpMg(skus,CHANNELS_OTHERS),
      oth_nose:  grpMg(noSE,CHANNELS_OTHERS),
    };
    const chNoSE = {};
    ALL_CH.forEach(ch=>{chNoSE[ch]=grpMg(noSE,[ch]);});

    // SE total destroyed
    const seSkus = skus.filter(isSE);
    const seTotal = {
      fat: ALL_CH.reduce((s,ch)=>s+seSkus.reduce((a,r)=>a+r[ch],0),0),
      mg_r: ALL_CH.reduce((s,ch)=>s+seSkus.reduce((a,r)=>a+r[ch]*r.mg,0),0)
    };

    // ── Top categories — MINE only ───────────────────────────────────────────
    const byDept = {};
    skus.forEach(s => {
      const fatMineS = CHANNELS_MINE.reduce((a,ch)=>a+s[ch],0);
      if (fatMineS<=0) return;
      if (!byDept[s.dept]) byDept[s.dept]={fat:0,mg_r:0,qtd:0,units:0};
      byDept[s.dept].fat  += fatMineS;
      byDept[s.dept].mg_r += fatMineS*s.mg;
      byDept[s.dept].qtd  += 1;
      byDept[s.dept].units+= s.qtd;
    });
    const topDept = Object.entries(byDept).sort((a,b)=>b[1].fat-a[1].fat).slice(0,8);

    // ── Top 20 SKUs ──────────────────────────────────────────────────────────
    const top20 = [...skus].sort((a,b)=>b.fat-a.fat).slice(0,20);

    // ── Top brands ───────────────────────────────────────────────────────────
    const byMarca = {};
    skus.forEach(s => {
      if (!byMarca[s.marca]) byMarca[s.marca]={fat:0,mg_r:0,qtd:0};
      byMarca[s.marca].fat  += s.fat;
      byMarca[s.marca].mg_r += s.mg_r;
      byMarca[s.marca].qtd  += s.qtd;
    });
    const topMarca = Object.entries(byMarca).sort((a,b)=>b[1].fat-a[1].fat).slice(0,15);

    // ── Render ────────────────────────────────────────────────────────────────
    const now = new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

    const compRows = (chs,data) => chs.sort((a,b)=>(data[b]?.pct||0)-(data[a]?.pct||0))
      .map(ch=>`<div class="comp-ch-row"><span class="cc-name">${ch}</span><span><span class="cc-val" style="color:${clr(data[ch]?.pct||0)}">${pct(data[ch]?.pct||0)}</span><span class="cc-fat">${fmt(data[ch]?.fat||0)}</span></span></div>`).join('');

    const chRow = (ch) => {
      const d = chData[ch];
      const isMine = CHANNELS_MINE.includes(ch);
      const groupFat = isMine ? fatMine : fatOth;
      const share = groupFat>0 ? d.fat/groupFat : 0;
      const at = d.meta>0?d.fat/d.meta:0;
      const bw = Math.min(100,share*100).toFixed(1);
      const warn = d.pct<0?' <span style="color:#b91c1c">⚠</span>':'';
      const rowId = 'chrow-'+ch.replace(/\s/g,'-').replace(/[^\w-]/g,'');
      return `<tr id="${rowId}">
        <td style="font-weight:500">${ch}${warn}</td>
        <td class="r ch-fat">${fmt(d.fat)}</td>
        <td class="r"><span class="badge ${bdg(d.pct)}">${pct(d.pct)}</span></td>
        <td class="r ch-qtd">${fmtN(d.qtd)}</td>
        <td><div class="share-bar"><div class="sbar"><div class="sbfill" style="width:${bw}%;background:${d.pct>=0.15?'#16a34a':d.pct>=0.05?'#3b82f6':'#ef4444'}"></div></div><span class="spct ch-share">${(share*100).toFixed(1)}%</span></div></td>
        <td class="r" style="font-size:10px;color:#aaa">${at>0?(at*100).toFixed(1)+'%':'-'}</td>
      </tr>`;
    };

    document.getElementById('dashboard').innerHTML = `
    <div class="header">
      <div><div class="h-eye">up2tech · Marketplace Management</div><div class="h-title">Dashboard Executivo — Marketplaces</div></div>
      <div style="text-align:right">
        <div style="font-size:13px;font-weight:600">${skus.length} SKUs · ${ALL_CH.length} canais</div>
        <div style="font-size:10px;color:#aaa;margin-top:2px">Atualizado ${now}</div>
        <div><span class="h-badge">● Live — Google Sheets</span></div>
      </div>
    </div>

    <!-- KPIs -->
    <p class="slbl">Resumo geral</p>
    <div class="kpi-row">
      <div class="kpi"><div class="kl">Faturamento total</div><div class="kv">${fmt(totalFat)}</div><div class="ka">${totalQtd.toLocaleString('pt-BR')} unidades</div></div>
      <div class="kpi"><div class="kl">Margem bruta</div><div class="kv" style="color:${clr(totalMgR/totalFat)}">${pct(totalMgR/totalFat)}</div><div class="ka">${fmt(totalMgR)} gerados</div></div>
      <div class="kpi"><div class="kl">Ticket médio</div><div class="kv">R$ ${totalQtd>0?Math.round(totalFat/totalQtd).toLocaleString('pt-BR'):'—'}</div><div class="ka">${skus.length} SKUs ativos</div></div>
      <div class="kpi alert"><div class="kl">Margem destruída (SE)</div><div class="kv" style="color:#b91c1c">${fmt(seTotal.mg_r)}</div><div class="ka">Mg. média ${seTotal.fat>0?pct(seTotal.mg_r/seTotal.fat):'—'}</div></div>
    </div>

    <!-- SE Toggle button -->
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
      <div style="background:#fff;border:0.5px solid #e5e5e5;border-radius:20px;display:inline-flex;overflow:hidden;">
        <button id="se-btn-nose" onclick="toggleSE('nose')"
          style="padding:4px 12px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;background:#f0f7f0;color:#16a34a;border:none;cursor:pointer;border-right:0.5px solid #e5e5e5;">
          s/ iPhone SE
        </button>
        <button id="se-btn-wse" onclick="toggleSE('wse')"
          style="padding:4px 12px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;background:#fff;color:#aaa;border:none;cursor:pointer;">
          c/ iPhone SE
        </button>
      </div>
    </div>

    <!-- Meus canais x Outros canais -->
    <p class="slbl">Performance dos canais</p>
    <div class="two-grp">
      <div class="grp-panel">
        <div class="grp-head">
          <span class="grp-title">Meus canais</span>
          <div class="grp-summary">
            <div>
              <div class="gs-fat" id="mine-fat">${fmt(fatMine)}</div>
              <div class="gs-share" id="mine-share">${(fatMine/fatTotal*100).toFixed(1)}% do total</div>
            </div>
            <div>
              <div class="gs-mg" id="mine-mg" style="color:${clr(mgMine)}">${pct(mgMine)}</div>
              <div class="gs-share">margem ponderada</div>
            </div>
          </div>
        </div>
        <table class="ch-tbl">
          <thead><tr><th>Canal</th><th class="r">Faturamento</th><th class="r">Margem</th><th class="r">Qtd</th><th>Share</th><th class="r">Meta</th></tr></thead>
          <tbody>${CHANNELS_MINE.map(ch=>chRow(ch)).join('')}</tbody>
        </table>
      </div>
      <div class="grp-panel">
        <div class="grp-head">
          <span class="grp-title">Outros canais</span>
          <div class="grp-summary">
            <div>
              <div class="gs-fat" id="oth-fat">${fmt(fatOth)}</div>
              <div class="gs-share" id="oth-share">${(fatOth/fatTotal*100).toFixed(1)}% do total</div>
            </div>
            <div>
              <div class="gs-mg" id="oth-mg" style="color:${clr(mgOth)}">${pct(mgOth)}</div>
              <div class="gs-share">margem ponderada</div>
            </div>
          </div>
        </div>
        <table class="ch-tbl">
          <thead><tr><th>Canal</th><th class="r">Faturamento</th><th class="r">Margem</th><th class="r">Qtd</th><th>Share</th><th class="r">Meta</th></tr></thead>

    <!-- Top categorias meus canais -->
    <p class="slbl">Top categorias — meus canais</p>
    <div class="panel">
      <table class="data-tbl">
        <thead><tr><th>Categoria</th><th class="r">Faturamento</th><th class="r">Margem %</th><th class="r">Margem R$</th><th class="r">Qtd. Unid.</th><th class="r">Ticket Médio</th></tr></thead>
        <tbody>${topDept.map(([d,v])=>`
          <tr>
            <td style="font-weight:500">${d}</td>

            <td class="r"><span class="badge ${bdg(v.mg_r/v.fat)}">${pct(v.mg_r/v.fat)}</span></td>
            <td class="r" style="color:${v.mg_r>=0?'#16a34a':'#b91c1c'};font-weight:600">${fmt(v.mg_r)}</td>

function tog(mode) {
  // kept for compatibility
}

let _seMode = 'nose';
let _chCalc = null;
let _chNoSE = null;
let _chMine = null;
let _chOth  = null;
let _fatMine = 0, _fatOth = 0;

function toggleSE(mode) {
  _seMode = mode;
  const btnNose = document.getElementById('se-btn-nose');
  const btnWse  = document.getElementById('se-btn-wse');
  if (mode === 'nose') {
    btnNose.style.background='#f0f7f0'; btnNose.style.color='#16a34a';
    btnWse.style.background='#fff';     btnWse.style.color='#aaa';
  } else {
    btnWse.style.background='#fff3e0';  btnWse.style.color='#b45309';
    btnNose.style.background='#fff';    btnNose.style.color='#aaa';
  }
  // Update channel rows
  updateChannelRows();
}

function updateChannelRows() {
  if (!_chCalc) return;
  const data = _seMode === 'nose' ? _chNoSE : _chCalc;
  const mineData = _seMode === 'nose' ? _chMine.nose : _chMine.all;
  const othData  = _seMode === 'nose' ? _chOth.nose  : _chOth.all;

  // Update group totals
  document.getElementById('mine-fat').textContent = _fmt(mineData.fat);
  document.getElementById('mine-share').textContent = (_fatTotal>0?(mineData.fat/_fatTotal*100).toFixed(1):'0.0')+'% do total';
  document.getElementById('mine-mg').textContent = _pct(mineData.pct);
  document.getElementById('mine-mg').style.color = _clr(mineData.pct);
  document.getElementById('oth-fat').textContent = _fmt(othData.fat);
  document.getElementById('oth-share').textContent = (_fatTotal>0?(othData.fat/_fatTotal*100).toFixed(1):'0.0')+'% do total';
  document.getElementById('oth-mg').textContent = _pct(othData.pct);
  document.getElementById('oth-mg').style.color = _clr(othData.pct);

  // Update each channel row
  const allChs = [..._chsMine, ..._chsOth];
  allChs.forEach(ch => {
    const d = data[ch] || {fat:0,pct:0,qtd:0};
    const isMine = _chsMine.includes(ch);
    const groupFat = isMine ? mineData.fat : othData.fat;
    const share = groupFat>0 ? d.fat/groupFat : 0;
    const el = document.getElementById('chrow-'+ch.replace(/\s/g,'-').replace(/[^\w-]/g,''));
    if (!el) return;
    el.querySelector('.ch-fat').textContent = _fmt(d.fat);
    const badge = el.querySelector('.badge');
    badge.textContent = _pct(d.pct);
    badge.className = 'badge '+_bdg(d.pct);
    el.querySelector('.ch-qtd').textContent = _fmtN(d.qtd||0);
    el.querySelector('.ch-share').textContent = (share*100).toFixed(1)+'%';
    const bar = el.querySelector('.sbfill');
    bar.style.width = Math.min(100,share*100).toFixed(1)+'%';
    bar.style.background = d.pct>=0.15?'#16a34a':d.pct>=0.05?'#3b82f6':'#ef4444';
  });
}

// Utility copies for use in updateChannelRows
function _fmt(n){if(Math.abs(n)>=1e6)return'R$ '+(n/1e6).toFixed(1)+'M';if(Math.abs(n)>=1e3)return'R$ '+Math.round(n/1e3)+'K';return'R$ '+Math.round(n);}
function _fmtN(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?Math.round(n/1e3)+'K':Math.round(n).toString();}
function _pct(n){return(n*100).toFixed(1)+'%';}
function _clr(v){return v>=0.15?'#16a34a':v>=0.05?'#b45309':'#b91c1c';}
function _bdg(v){return v>=0.15?'bg':v>=0.05?'bb':'br';}

let _fatTotal = 0, _chsMine = [], _chsOth = [];

load();
</script>
