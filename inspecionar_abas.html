<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Inspecionar abas</title>
<style>
body{font-family:monospace;padding:20px;background:#1a1a1a;color:#e8e6df;}
pre{background:#111;padding:12px;border-radius:6px;overflow-x:auto;font-size:11px;}
h3{color:#a78bfa;margin-top:16px;}
.ok{color:#4ade80;} .err{color:#f87171;}
button{background:#a78bfa;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:13px;margin-bottom:16px;}
</style>
</head>
<body>
<h2>Inspetor de abas — Google Sheets</h2>
<button onclick="inspectAll()">Inspecionar todas as abas</button>
<div id="output"></div>

<script>
const SHEET_ID = '1hnxVpZRALknZCN7Cp9LwWBOHB9CpNV8cD156ZqhoMjg';
const TABS = ['Amazon Database', 'Magalu Database', 'Martins Database', 'AnyMarket Database'];

async function fetchTab(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const txt = await r.text();
  const m = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
  if (!m) throw new Error('Formato inesperado');
  const data = JSON.parse(m[1]);
  const cols = data.table.cols.map(c => c.label || c.id);
  const rows = data.table.rows;
  return { cols, rows, total: rows.length };
}

function cellVal(cell) {
  if (!cell) return '';
  if (cell.f) return cell.f;
  if (cell.v !== null && cell.v !== undefined) return String(cell.v).substring(0, 30);
  return '';
}

async function inspectAll() {
  const out = document.getElementById('output');
  out.innerHTML = '<p>Carregando...</p>';
  let html = '';
  
  for (const tab of TABS) {
    try {
      const { cols, rows, total } = await fetchTab(tab);
      html += `<h3 class="ok">✓ ${tab} — ${total} linhas</h3>`;
      html += `<pre>Colunas (${cols.length}): ${JSON.stringify(cols.slice(0,15))}\n\n`;
      html += `Primeiras 5 linhas:\n`;
      for (let i = 0; i < Math.min(5, rows.length); i++) {
        const r = rows[i];
        const vals = (r && r.c) ? r.c.slice(0,10).map(cellVal) : [];
        html += `  Row ${i+1}: ${JSON.stringify(vals)}\n`;
      }
      html += `</pre>`;
    } catch(e) {
      html += `<h3 class="err">✗ ${tab} — Erro: ${e.message}</h3>`;
    }
  }
  
  out.innerHTML = html;
}
</script>
</body>
</html>
